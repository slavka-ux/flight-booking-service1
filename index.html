<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Бронювання авіаквитків</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">✈️</span>
                <span class="logo-text">Flight Booking</span>
            </div>
        </div>
    </header>

    <section class="search-section">
        <div class="container">
            <h1>Пошук та бронювання</h1>
            <form id="searchForm" class="search-form">
                <div class="form-group">
                    <label for="origin">✈️ Звідки</label>
                    <input type="text" id="origin" placeholder="Київ" value="Київ" required>
                </div>
                <div class="form-group">
                    <label for="destination">🎯 Куди</label>
                    <input type="text" id="destination" placeholder="Львів" value="Львів" required>
                </div>
                <div class="form-group">
                    <label for="date">📅 Дата</label>
                    <input type="date" id="date">
                </div>
                <button type="submit" class="btn-primary">🔍 Пошук</button>
            </form>
        </div>
    </section>

    <section class="results-section">
        <div class="container">
            <h2 id="resultsTitle">Доступні рейси</h2>
            <div id="flightList" class="flight-list">
                <!-- Рейси -->
            </div>
        </div>
    </section>

    <!-- Модальне вікно бронювання -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>✈️ Бронювання квитків</h2>
            <div id="bookingInfo" class="booking-info">
                <!-- Інформація про рейс -->
            </div>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="userName">Ваше ім'я (для бронювання)</label>
                    <input type="text" id="userName" placeholder="Іван Петренко" required>
                </div>
                <div class="form-group">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label for="userPhone">Телефон</label>
                    <input type="tel" id="userPhone" placeholder="+380501234567">
                </div>
                <div id="passengersContainer">
                    <label>Пасажири</label>
                    <div class="passenger-entry">
                        <input type="text" class="passenger-name" placeholder="ПІБ пасажира" required>
                        <input type="text" class="passenger-passport" placeholder="Номер паспорта (AA123456)" required>
                    </div>
                </div>
                <button type="button" id="addPassengerBtn" class="btn-secondary">+ Додати пасажира</button>
                <div class="form-group">
                    <label for="bookingNotes">Нотатки (опціонально)</label>
                    <textarea id="bookingNotes" rows="2" placeholder="Особливі побажання..."></textarea>
                </div>
                <button type="submit" class="btn-primary" id="bookBtn">Забронювати</button>
            </form>
            <div id="bookingResult" style="display:none; margin-top:1rem;"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Flight Booking Service</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
