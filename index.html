<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Пошук авіаквитків</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">✈️</span>
                <span class="logo-text">Flight Search</span>
            </div>
        </div>
    </header>

    <!-- Секція пошуку -->
    <section class="search-section">
        <div class="container">
            <h1>Знайдіть найкращі авіаквитки</h1>
            <p class="subtitle">Введіть маршрут та отримайте список доступних рейсів</p>
            
            <form id="searchForm" class="search-form">
                <div class="form-group">
                    <label for="origin">✈️ Звідки</label>
                    <input type="text" id="origin" placeholder="Київ" value="Київ" required>
                </div>
                <div class="form-group">
                    <label for="destination">🎯 Куди</label>
                    <input type="text" id="destination" placeholder="Львів" value="Львів" required>
                </div>
                <div class="form-group">
                    <label for="date">📅 Дата</label>
                    <input type="date" id="date">
                </div>
                <button type="submit" class="btn-primary">🔍 Пошук</button>
            </form>
        </div>
    </section>

    <!-- Секція результатів -->
    <section class="results-section">
        <div class="container">
            <h2 id="resultsTitle">Доступні рейси</h2>
            <div id="resultsContainer">
                <div id="flightList" class="flight-list">
                    <!-- Результати завантажуються через JavaScript -->
                </div>
                <div id="loadingIndicator" style="display:none; text-align:center; padding:2rem;">
                    <div class="spinner"></div>
                    <p>Завантаження рейсів...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Flight Search Service. Всі права захищені.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
