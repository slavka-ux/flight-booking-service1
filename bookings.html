<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої бронювання — FlyBooking</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --color-primary: #2563eb;
            --color-primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --color-secondary: #0f172a;
            --color-white: #ffffff;
            --color-gray-50: #f8fafc;
            --color-gray-100: #f1f5f9;
            --color-gray-200: #e2e8f0;
            --color-gray-300: #cbd5e1;
            --color-gray-400: #94a3b8;
            --color-gray-500: #64748b;
            --color-gray-600: #475569;
            --color-gray-700: #334155;
            --color-gray-800: #1e293b;
            --color-gray-900: #0f172a;
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-warning: #f59e0b;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-full: 9999px;
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --max-width: 1280px;
            --header-height: 72px;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-gray-50);
            color: var(--color-gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        /* Header */
        .header {
            background: var(--color-white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: var(--header-height);
            display: flex;
            align-items: center;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--color-gray-900);
            text-decoration: none;
        }
        .logo-icon { font-size: 1.5rem; }
        .logo-text span { color: var(--color-primary); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font-family);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            min-height: 44px;
        }

        .btn-primary {
            background: var(--color-primary-gradient);
            color: var(--color-white);
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.45);
        }

        .btn-outline {
            background: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
        }
        .btn-outline:hover {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .btn-success {
            background: var(--color-success);
            color: var(--color-white);
        }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--color-danger);
            color: var(--color-white);
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 0.375rem 1rem;
            font-size: 0.75rem;
            min-height: 36px;
        }
        .btn-block { width: 100%; justify-content: center; }

        /* Page */
        .page {
            padding: 3rem 0;
            min-height: calc(100vh - var(--header-height) - 80px);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 800;
        }
        .page-title span {
            background: var(--color-primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-gray-500);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition);
        }
        .back-home:hover {
            color: var(--color-primary);
        }

        /* Booking Cards */
        .booking-filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-full);
            border: 2px solid var(--color-gray-200);
            background: var(--color-white);
            color: var(--color-gray-600);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-family);
        }
        .filter-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        .filter-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: var(--color-white);
        }

        .booking-card {
            background: var(--color-white);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
            transition: all var(--transition);
            border-left: 4px solid var(--color-primary);
        }
        .booking-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .booking-card.cancelled {
            border-left-color: var(--color-danger);
            opacity: 0.7;
        }
        .booking-card.completed {
            border-left-color: var(--color-success);
        }

        .booking-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .booking-route {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 700;
            font-size: 1.125rem;
        }
        .booking-route .arrow {
            color: var(--color-gray-400);
            font-size: 0.875rem;
        }

        .booking-status {
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-active {
            background: #dbeafe;
            color: var(--color-primary);
        }
        .status-completed {
            background: #d1fae5;
            color: var(--color-success);
        }
        .status-cancelled {
            background: #fef2f2;
            color: var(--color-danger);
        }

        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            padding: 0.75rem 0;
            border-top: 1px solid var(--color-gray-100);
            border-bottom: 1px solid var(--color-gray-100);
            margin: 0.75rem 0;
        }

        .booking-detail-item {
            display: flex;
            flex-direction: column;
        }
        .booking-detail-item .label {
            font-size: 0.75rem;
            color: var(--color-gray-400);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .booking-detail-item .value {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .booking-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .booking-price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--color-primary);
        }

        .booking-actions {
            display: flex;
            gap: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .empty-state p {
            color: var(--color-gray-500);
            margin-bottom: 1.5rem;
        }

        /* Footer */
        .footer {
            background: var(--color-gray-900);
            color: rgba(255,255,255,0.7);
            padding: 2rem 0 1.5rem;
        }
        .footer-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.875rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .footer-bottom-links {
            display: flex;
            gap: 1.5rem;
        }
        .footer-bottom-links a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color var(--transition);
            font-size: 0.75rem;
        }
        .footer-bottom-links a:hover { color: var(--color-white); }

        @media (max-width: 768px) {
            .booking-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .booking-route {
                font-size: 1rem;
            }
            .booking-details {
                grid-template-columns: 1fr 1fr;
            }
            .booking-footer {
                flex-direction: column;
                align-items: flex-start;
            }
            .booking-actions {
                width: 100%;
            }
            .booking-actions .btn {
                flex: 1;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
            .footer-bottom-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .booking-details {
                grid-template-columns: 1fr;
            }
            .page-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="logo">
                <span class="logo-icon">✈️</span>
                <span class="logo-text">Fly<span>Booking</span></span>
            </a>
            <div id="navUser"></div>
        </nav>
    </div>
</header>

<!-- Page -->
<main class="page">
    <div class="container">
        <a href="profile.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Назад до профілю
        </a>

        <div class="page-header">
            <h1 class="page-title">Мої <span>бронювання</span></h1>
            <button class="btn btn-primary btn-sm" onclick="showToast('🔍 Пошук за історією...', 'info')">
                <i class="fas fa-download"></i> Експортувати
            </button>
        </div>

        <!-- Фільтри -->
        <div class="booking-filters">
            <button class="filter-btn active" data-filter="all" onclick="filterBookings('all', this)">Всі</button>
            <button class="filter-btn" data-filter="active" onclick="filterBookings('active', this)">Активні</button>
            <button class="filter-btn" data-filter="completed" onclick="filterBookings('completed', this)">Завершені</button>
            <button class="filter-btn" data-filter="cancelled" onclick="filterBookings('cancelled', this)">Скасовані</button>
        </div>

        <!-- Список бронювань -->
        <div id="bookingsList"></div>
    </div>
</main>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <div class="footer-bottom">
            <div class="footer-bottom-links">
                <a href="#">Політика конфіденційності</a>
                <a href="#">Умови використання</a>
                <a href="#">Cookies</a>
            </div>
            <p style="color: rgba(255,255,255,0.4); font-size: 0.75rem;">
                &copy; 2026 FlyBooking. Всі права захищено.
            </p>
        </div>
    </div>
</footer>

<!-- Toast Container -->
<div id="toastContainer" style="position:fixed;bottom:2rem;right:2rem;z-index:5000;display:flex;flex-direction:column;gap:0.5rem;max-width:400px;"></div>

<script>
    (function() {
        // ============================
        // 1. USER
        // ============================
        function getUser() {
            return JSON.parse(localStorage.getItem('flybooking_user'));
        }

        const user = getUser();
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        // ============================
        // 2. ДАНІ БРОНЮВАНЬ
        // ============================
        const bookings = [
            {
                id: 'FB-2026-001',
                origin: 'Київ (KBP)',
                destination: 'Париж (CDG)',
                departure: '15.07.2026',
                return: '22.07.2026',
                airline: 'Ryanair',
                price: '€162',
                status: 'active',
                passengers: '2 дорослих',
                class: 'Економ'
            },
            {
                id: 'FB-2026-002',
                origin: 'Київ (KBP)',
                destination: 'Нью-Йорк (JFK)',
                departure: '01.09.2026',
                return: '15.09.2026',
                airline: 'Turkish Airlines',
                price: '$640',
                status: 'active',
                passengers: '1 дорослий',
                class: 'Бізнес'
            },
            {
                id: 'FB-2026-003',
                origin: 'Київ (KBP)',
                destination: 'Дубай (DXB)',
                departure: '10.10.2026',
                return: '20.10.2026',
                airline: 'FlyDubai',
                price: '$301',
                status: 'active',
                passengers: '2 дорослих, 1 дитина',
                class: 'Економ'
            },
            {
                id: 'FB-2025-015',
                origin: 'Львів (LWO)',
                destination: 'Барселона (BCN)',
                departure: '05.12.2025',
                return: '12.12.2025',
                airline: 'Wizz Air',
                price: '€120',
                status: 'completed',
                passengers: '1 дорослий',
                class: 'Економ'
            },
            {
                id: 'FB-2025-008',
                origin: 'Київ (KBP)',
                destination: 'Стамбул (IST)',
                departure: '20.08.2025',
                return: '27.08.2025',
                airline: 'Pegasus',
                price: '$180',
                status: 'cancelled',
                passengers: '3 дорослих',
                class: 'Економ'
            },
            {
                id: 'FB-2025-003',
                origin: 'Кишинів (KIV)',
                destination: 'Рим (FCO)',
                departure: '10.06.2025',
                return: '17.06.2025',
                airline: 'Ryanair',
                price: '€95',
                status: 'completed',
                passengers: '2 дорослих',
                class: 'Економ'
            }
        ];

        // ============================
        // 3. РЕНДЕР БРОНЮВАНЬ
        // ============================
        function renderBookings(filter = 'all') {
            const container = document.getElementById('bookingsList');
            let filtered = bookings;

            if (filter !== 'all') {
                filtered = bookings.filter(b => b.status === filter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>Немає бронювань</h3>
                        <p>У вас поки що немає ${filter !== 'all' ? filter === 'active' ? 'активних' : filter === 'completed' ? 'завершених' : 'скасованих' : ''} бронювань</p>
                        <a href="index.html" class="btn btn-primary">
                            <i class="fas fa-search"></i> Знайти квитки
                        </a>
                    </div>
                `;
                return;
            }

            const statusLabels = {
                active: { class: 'status-active', label: 'Активне' },
                completed: { class: 'status-completed', label: 'Завершене' },
                cancelled: { class: 'status-cancelled', label: 'Скасоване' }
            };

            container.innerHTML = filtered.map(booking => `
                <div class="booking-card ${booking.status === 'cancelled' ? 'cancelled' : booking.status === 'completed' ? 'completed' : ''}">
                    <div class="booking-header">
                        <div class="booking-route">
                            <span>${booking.origin}</span>
                            <span class="arrow">✈</span>
                            <span>${booking.destination}</span>
                        </div>
                        <div>
                            <span class="booking-status ${statusLabels[booking.status].class}">
                                ${statusLabels[booking.status].label}
                            </span>
                            <span style="margin-left:0.75rem;font-size:0.75rem;color:var(--color-gray-400);">${booking.id}</span>
                        </div>
                    </div>

                    <div class="booking-details">
                        <div class="booking-detail-item">
                            <span class="label">Дата вильоту</span>
                            <span class="value">${booking.departure}</span>
                        </div>
                        <div class="booking-detail-item">
                            <span class="label">Дата повернення</span>
                            <span class="value">${booking.return}</span>
                        </div>
                        <div class="booking-detail-item">
                            <span class="label">Авіакомпанія</span>
                            <span class="value">${booking.airline}</span>
                        </div>
                        <div class="booking-detail-item">
                            <span class="label">Пасажири</span>
                            <span class="value">${booking.passengers}</span>
                        </div>
                        <div class="booking-detail-item">
                            <span class="label">Клас</span>
                            <span class="value">${booking.class}</span>
                        </div>
                    </div>

                    <div class="booking-footer">
                        <div class="booking-price">${booking.price}</div>
                        <div class="booking-actions">
                            ${booking.status === 'active' ? `
                                <button class="btn btn-outline btn-sm" onclick="showToast('📄 Перегляд деталей ${booking.id}', 'info')">
                                    <i class="fas fa-info-circle"></i> Деталі
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="cancelBooking('${booking.id}')">
                                    <i class="fas fa-times"></i> Скасувати
                                </button>
                            ` : `
                                <button class="btn btn-outline btn-sm" onclick="showToast('📄 Перегляд деталей ${booking.id}', 'info')">
                                    <i class="fas fa-info-circle"></i> Деталі
                                </button>
                                <button class="btn btn-primary btn-sm" onclick="showToast('🔄 Бронювання повторно ${booking.id}', 'info')">
                                    <i class="fas fa-redo"></i> Повторити
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ============================
        // 4. ФІЛЬТРИ
        // ============================
        window.filterBookings = function(filter, btn) {
            document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            renderBookings(filter);
        };

        // ============================
        // 5. СКАСУВАННЯ
        // ============================
        window.cancelBooking = function(id) {
            if (confirm(`Ви впевнені, що хочете скасувати бронювання ${id}?`)) {
                const booking = bookings.find(b => b.id === id);
                if (booking) {
                    booking.status = 'cancelled';
                    showToast(`❌ Бронювання ${id} скасовано`, 'error');
                    const activeFilter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'all';
                    renderBookings(activeFilter);
                }
            }
        };

        // ============================
        // 6. TOAST
        // ============================
        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.style.cssText = `
                padding: 1rem 1.5rem;
                border-radius: 12px;
                color: white;
                font-weight: 500;
                font-size: 0.875rem;
                box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
                animation: slideUp 0.3s ease;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#2563eb'};
            `;
            toast.textContent = message;

            // Додаємо анімацію
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideUp {
                    from { opacity: 0; transform: translateY(20px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        };

        // ============================
        // 7. HEADER
        // ============================
        const initials = (user.firstName?.charAt(0) || '') + (user.lastName?.charAt(0) || '');
        document.getElementById('navUser').innerHTML = `
            <span style="display:flex;align-items:center;gap:0.5rem;font-weight:600;color:var(--color-gray-700);">
                <span style="width:36px;height:36px;border-radius:50%;background:var(--color-primary-gradient);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.875rem;">${initials || 'U'}</span>
                ${user.firstName || 'Користувач'}
            </span>
        `;

        // ============================
        // 8. INIT
        // ============================
        renderBookings('all');

        console.log('📋 Сторінка бронювань завантажена');
    })();
</script>

</body>
</html>
