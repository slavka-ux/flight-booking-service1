<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Адмін-панель - Flight Booking</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <nav class="admin-nav">
        <div class="container">
            <div class="nav-brand">
                <span>👑</span>
                <span>Адмін-панель</span>
            </div>
            <div class="nav-links">
                <a href="#dashboard" class="active">📊 Дашборд</a>
                <a href="#flights">✈️ Рейси</a>
                <a href="#bookings">📋 Бронювання</a>
                <a href="#users">👤 Користувачі</a>
                <a href="/">🏠 На сайт</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <!-- Dashboard -->
        <section id="dashboard" class="admin-section active">
            <div class="container">
                <h1>📊 Дашборд</h1>
                
                <div class="stats-grid" id="statsGrid">
                    <!-- Статистика завантажується через JS -->
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Статуси рейсів</h3>
                        <div id="flightStatusChart" class="chart"></div>
                    </div>
                    <div class="chart-card">
                        <h3>Статуси бронювань</h3>
                        <div id="bookingStatusChart" class="chart"></div>
                    </div>
                </div>

                <div class="recent-activity">
                    <h3>Остання активність</h3>
                    <div id="recentActivity">
                        <p class="empty">Завантаження...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Flights Management -->
        <section id="flights" class="admin-section">
            <div class="container">
                <div class="section-header">
                    <h1>✈️ Управління рейсами</h1>
                    <button class="btn-primary" onclick="showAddFlightModal()">+ Додати рейс</button>
                </div>

                <div class="filters">
                    <input type="text" id="flightSearch" placeholder="Пошук рейсів..." oninput="filterFlights()">
                    <select id="flightStatusFilter" onchange="filterFlights()">
                        <option value="">Всі статуси</option>
                        <option value="scheduled">Заплановано</option>
                        <option value="delayed">Затримано</option>
                        <option value="cancelled">Скасовано</option>
                        <option value="completed">Завершено</option>
                    </select>
                </div>

                <div id="flightsList" class="admin-list">
                    <!-- Рейси завантажуються через JS -->
                </div>
            </div>
        </section>

        <!-- Bookings Management -->
        <section id="bookings" class="admin-section">
            <div class="container">
                <div class="section-header">
                    <h1>📋 Управління бронюваннями</h1>
                </div>

                <div class="filters">
                    <input type="text" id="bookingSearch" placeholder="Пошук бронювань..." oninput="filterBookings()">
                    <select id="bookingStatusFilter" onchange="filterBookings()">
                        <option value="">Всі статуси</option>
                        <option value="pending">Очікує</option>
                        <option value="confirmed">Підтверджено</option>
                        <option value="cancelled">Скасовано</option>
                        <option value="completed">Завершено</option>
                    </select>
                </div>

                <div id="bookingsList" class="admin-list">
                    <!-- Бронювання завантажуються через JS -->
                </div>
            </div>
        </section>

        <!-- Users Management -->
        <section id="users" class="admin-section">
            <div class="container">
                <div class="section-header">
                    <h1>👤 Управління користувачами</h1>
                </div>

                <div class="filters">
                    <input type="text" id="userSearch" placeholder="Пошук користувачів..." oninput="filterUsers()">
                    <select id="userRoleFilter" onchange="filterUsers()">
                        <option value="">Всі ролі</option>
                        <option value="user">Користувачі</option>
                        <option value="admin">Адміністратори</option>
                    </select>
                </div>

                <div id="usersList" class="admin-list">
                    <!-- Користувачі завантажуються через JS -->
                </div>
            </div>
        </section>
    </div>

    <!-- Add Flight Modal -->
    <div id="addFlightModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddFlightModal()">&times;</span>
            <h2>✈️ Додати новий рейс</h2>
            <form id="addFlightForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Авіакомпанія</label>
                        <input type="text" id="f_airline" placeholder="Sky Airlines" required>
                    </div>
                    <div class="form-group">
                        <label>Номер рейсу</label>
                        <input type="text" id="f_flight_number" placeholder="SA-102" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Звідки</label>
                        <input type="text" id="f_origin" placeholder="Київ" required>
                    </div>
                    <div class="form-group">
                        <label>Куди</label>
                        <input type="text" id="f_destination" placeholder="Львів" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Дата та час вильоту</label>
                        <input type="datetime-local" id="f_departure" required>
                    </div>
                    <div class="form-group">
                        <label>Дата та час прильоту</label>
                        <input type="datetime-local" id="f_arrival" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ціна (₴)</label>
                        <input type="number" id="f_price" placeholder="2500" required>
                    </div>
                    <div class="form-group">
                        <label>Доступні місця</label>
                        <input type="number" id="f_seats" placeholder="45" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Літак</label>
                        <input type="text" id="f_aircraft" placeholder="Boeing 737">
                    </div>
                    <div class="form-group">
                        <label>Термінал</label>
                        <input type="text" id="f_terminal" placeholder="A">
                    </div>
                    <div class="form-group">
                        <label>Вихід</label>
                        <input type="text" id="f_gate" placeholder="12">
                    </div>
                </div>
                <button type="submit" class="btn-primary">➕ Додати рейс</button>
            </form>
        </div>
    </div>

    <!-- Edit Flight Modal -->
    <div id="editFlightModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditFlightModal()">&times;</span>
            <h2>✈️ Редагувати рейс</h2>
            <form id="editFlightForm">
                <input type="hidden" id="e_flight_id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Авіакомпанія</label>
                        <input type="text" id="e_airline" required>
                    </div>
                    <div class="form-group">
                        <label>Номер рейсу</label>
                        <input type="text" id="e_flight_number" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Звідки</label>
                        <input type="text" id="e_origin" required>
                    </div>
                    <div class="form-group">
                        <label>Куди</label>
                        <input type="text" id="e_destination" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Дата та час вильоту</label>
                        <input type="datetime-local" id="e_departure" required>
                    </div>
                    <div class="form-group">
                        <label>Дата та час прильоту</label>
                        <input type="datetime-local" id="e_arrival" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ціна (₴)</label>
                        <input type="number" id="e_price" required>
                    </div>
                    <div class="form-group">
                        <label>Доступні місця</label>
                        <input type="number" id="e_seats" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="e_status">
                            <option value="scheduled">Заплановано</option>
                            <option value="delayed">Затримано</option>
                            <option value="cancelled">Скасовано</option>
                            <option value="completed">Завершено</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary">💾 Зберегти зміни</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
